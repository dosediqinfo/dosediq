<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DosedIQ — Educational Short-Form Video</title>
    <meta name="description" content="Bite-sized educational videos about science, nature, history, geography, and technology.">
    <meta property="og:title" content="DosedIQ">
    <meta property="og:description" content="Bite-sized educational videos about science, nature, history, geography, and technology.">
    <meta property="og:image" content="logo.png">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fa;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .logo {
            width: 160px;
            height: 160px;
            border-radius: 32px;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-size: 1.15rem;
            color: #555;
            max-width: 440px;
            line-height: 1.5;
            margin-bottom: 2.5rem;
        }

        .social-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .social-links a:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .social-links a:active {
            transform: translateY(0);
        }

        .yt { background: #FF0000; }
        .ig { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .tt { background: #000000; }

        .social-links svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.85rem;
            color: #888;
            border-top: 1px solid #e9ecef;
        }

        footer a {
            color: #555;
            text-decoration: none;
            margin: 0 0.75rem;
        }

        footer a:hover {
            color: #1a1a2e;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .logo {
                width: 120px;
                height: 120px;
                border-radius: 24px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .tagline {
                font-size: 1rem;
            }

            .social-links a {
                padding: 0.6rem 1.2rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
